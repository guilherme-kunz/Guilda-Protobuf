syntax = "proto3";

option java_package = "com.guilda.protobuf.data.model";
option java_outer_classname = "UserOuterClass";
option java_multiple_files = true;

package guilda;

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_ADMIN = 1;
  ROLE_EDITOR = 2;
  ROLE_VIEWER = 3;
}

message User {
  string id = 1;
  string name = 2;
  string email = 3;
  repeated Role roles = 4;
}

message UserList {
  repeated User users = 1;
}

message CreateUserRequest {
  string name  = 1;
  string email = 2;
  repeated Role roles = 3;
}
